<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>دليل المواطن — مكتب المختار</title>
<meta name="theme-color" content="#15532E">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="دليل المواطن">
<meta name="description" content="دليل المواطن للمعاملات الرسمية لدى مكتب المختار — المستندات المطلوبة، المهل القانونية، حجز موعد وتواصل مباشر.">
<link id="manifestLink" rel="manifest">
<link id="appleIcon" rel="apple-touch-icon">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800;900&family=Reem+Kufi:wght@500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script>
<style>
  :root{
    --paper:#F6F2E8; --paper-2:#EEE9DA; --card:#FCFAF3;
    --ink:#1A2A21; --ink-soft:#52615A;
    --cedar:#15532E; --cedar-2:#1F7A45; --cedar-deep:#0D3A20;
    --brass:#B0842C; --brass-soft:#D8BB72;
    --danger:#8F2A2A; --danger-bg:#FBEDEA; --danger-line:#E2B6AE;
    --wa:#1FA855; --ok:#1F7A45; --warn-amber:#9a6a12;
    --line:rgba(21,83,46,.14); --line-strong:rgba(21,83,46,.28);
    --shadow:0 10px 30px -12px rgba(13,58,32,.35); --shadow-sm:0 4px 14px -8px rgba(13,58,32,.4);
    --r:18px; --r-sm:12px;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0}
  body{font-family:'Cairo',system-ui,sans-serif;color:var(--ink);background:var(--paper);
    background-image:radial-gradient(1200px 600px at 100% -10%, rgba(31,122,69,.06), transparent 60%),radial-gradient(900px 500px at -10% 10%, rgba(176,132,44,.06), transparent 55%);
    line-height:1.6;-webkit-font-smoothing:antialiased;padding-bottom:90px;min-height:100vh}
  .wrap{max-width:1040px;margin:0 auto;padding:0 16px}

  .top{position:relative;padding:24px 0 8px}
  .topbtns{position:absolute;top:22px;left:0;display:flex;gap:8px}
  .iconbtn{width:40px;height:40px;border-radius:50%;border:1px solid var(--line);background:var(--card);color:var(--ink-soft);display:grid;place-items:center;cursor:pointer;font-size:17px;box-shadow:var(--shadow-sm);font-weight:800}
  .iconbtn:active{transform:scale(.95)}
  .brand{display:flex;align-items:center;gap:16px;padding-left:96px}
  @media(max-width:520px){.brand{padding-left:0;margin-top:46px}}
  .seal{width:84px;height:84px;flex:0 0 auto;filter:drop-shadow(0 4px 8px rgba(13,58,32,.18))}
  .brand-txt h1{font-family:'Reem Kufi',serif;font-weight:700;font-size:clamp(21px,5.6vw,32px);margin:0;color:var(--cedar-deep);letter-spacing:.5px}
  .brand-txt .region{font-size:13px;color:var(--ink-soft);margin-top:2px;font-weight:600}
  .status{display:inline-flex;align-items:center;gap:6px;font-size:12.5px;font-weight:800;margin-top:6px;padding:3px 10px;border-radius:999px}
  .status.open{background:rgba(31,122,69,.12);color:var(--ok)}
  .status.closed{background:var(--danger-bg);color:var(--danger)}
  .lede{margin:12px 2px 0;color:var(--ink-soft);font-size:14px;max-width:640px}

  .contact{display:flex;gap:9px;flex-wrap:wrap;margin:13px 2px 0}
  .cbtn{display:inline-flex;align-items:center;gap:7px;border-radius:999px;padding:9px 15px;font-weight:700;font-size:13.5px;text-decoration:none;border:1px solid var(--line-strong);cursor:pointer;font-family:inherit;color:var(--cedar-deep);background:var(--card)}
  .cbtn.wa{background:var(--wa);color:#fff;border-color:var(--wa)}
  .cbtn:active{transform:scale(.97)}

  .banner{margin:14px 0 0;background:linear-gradient(135deg,#7a5a18,var(--brass));color:#fff;border-radius:var(--r-sm);padding:12px 14px;display:flex;gap:10px;align-items:flex-start;box-shadow:var(--shadow-sm)}
  .banner .ic{font-size:18px}
  .banner p{margin:0;font-size:13.5px;font-weight:600;flex:1}
  .banner .x{background:rgba(255,255,255,.2);border:none;color:#fff;width:26px;height:26px;border-radius:50%;cursor:pointer;flex:0 0 auto;font-size:14px}
  .notice{margin:12px 0 0;border:1px solid var(--line);background:var(--card);border-radius:var(--r-sm);padding:11px 13px;font-size:12.5px;color:var(--ink-soft);display:flex;gap:9px}
  .notice .ic{color:var(--cedar);font-size:15px}

  .search{position:relative;margin:16px 0 6px}
  .search input{width:100%;border:1.5px solid var(--line-strong);background:var(--card);border-radius:999px;padding:14px 50px 14px 18px;font-family:inherit;font-size:16px;color:var(--ink);outline:none;box-shadow:var(--shadow-sm)}
  .search input:focus{border-color:var(--cedar-2)}
  .search .ic{position:absolute;top:50%;right:16px;transform:translateY(-50%);color:var(--cedar);font-size:18px;pointer-events:none}

  .tools{display:flex;gap:9px;flex-wrap:wrap;margin:10px 0 2px}
  .tool{display:inline-flex;align-items:center;gap:7px;background:var(--card);border:1.5px solid var(--line-strong);color:var(--cedar-deep);border-radius:12px;padding:10px 14px;font-family:inherit;font-weight:700;font-size:13.5px;cursor:pointer}
  .tool:hover{background:rgba(31,122,69,.06)}
  .tool.hl{background:linear-gradient(135deg,var(--cedar),var(--cedar-2));color:#fff;border-color:var(--cedar)}

  .section{margin-top:24px}
  .eyebrow{display:flex;align-items:center;gap:10px;margin:0 2px 12px}
  .eyebrow .dot{width:9px;height:9px;border-radius:50%;background:var(--brass)}
  .eyebrow h2{font-size:15px;font-weight:800;margin:0;color:var(--cedar-deep)}
  .eyebrow .rule{flex:1;height:1px;background:var(--line)}

  .grid{display:grid;grid-template-columns:1fr;gap:12px}
  @media(min-width:560px){.grid{grid-template-columns:1fr 1fr}}
  @media(min-width:900px){.grid{grid-template-columns:1fr 1fr 1fr}}

  .card{position:relative;background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:16px;cursor:pointer;box-shadow:var(--shadow-sm);transition:transform .12s, box-shadow .15s, border-color .15s;display:flex;flex-direction:column;gap:8px;overflow:hidden;text-align:right}
  .card::before{content:"";position:absolute;inset:0 auto 0 0;width:5px;background:linear-gradient(var(--cedar),var(--cedar-2))}
  .card.warn::before{background:linear-gradient(var(--danger),#C75050)}
  .card:hover{transform:translateY(-3px);box-shadow:var(--shadow);border-color:var(--line-strong)}
  .card .ic{font-size:25px}
  .card h3{margin:0;font-size:16.5px;font-weight:800;color:var(--ink)}
  .card p{margin:0;font-size:12.5px;color:var(--ink-soft)}
  .card .meta{display:flex;align-items:center;gap:8px;margin-top:2px;flex-wrap:wrap}
  .pill{font-size:11px;font-weight:700;padding:3px 9px;border-radius:999px;background:rgba(31,122,69,.1);color:var(--cedar)}
  .pill.danger{background:var(--danger-bg);color:var(--danger)}
  .pill.img{background:rgba(176,132,44,.14);color:#7a5a18}
  .edit-btn{position:absolute;top:10px;left:10px;font-size:12px;font-weight:700;background:var(--cedar);color:#fff;border:none;border-radius:8px;padding:4px 9px;cursor:pointer;display:none;z-index:2}
  body.admin .edit-btn{display:block}
  .add-card{border:1.6px dashed var(--line-strong);background:transparent;display:none;align-items:center;justify-content:center;color:var(--cedar);font-weight:800;font-size:15px;cursor:pointer;min-height:96px;border-radius:var(--r)}
  body.admin .add-card{display:flex}

  .overlay{position:fixed;inset:0;background:rgba(13,30,20,.55);backdrop-filter:blur(3px);z-index:80;display:none;opacity:0;transition:opacity .2s}
  .overlay.show{display:block;opacity:1}
  .sheet{position:fixed;z-index:85;left:50%;bottom:0;transform:translateX(-50%) translateY(100%);width:100%;max-width:680px;background:var(--paper);border-radius:22px 22px 0 0;box-shadow:0 -12px 40px -10px rgba(13,58,32,.4);max-height:92vh;overflow:hidden;transition:transform .26s cubic-bezier(.2,.8,.2,1);display:flex;flex-direction:column;pointer-events:none}
  .sheet.show{transform:translateX(-50%) translateY(0);pointer-events:auto}
  @media(min-width:680px){.sheet{bottom:auto;top:50%;transform:translateX(-50%) translateY(-46%) scale(.98);border-radius:22px;opacity:0}.sheet.show{transform:translateX(-50%) translateY(-50%) scale(1);opacity:1}}
  .sheet-grip{width:44px;height:5px;border-radius:99px;background:var(--line-strong);margin:10px auto 4px}
  @media(min-width:680px){.sheet-grip{display:none}}
  .sheet-head{padding:6px 20px 14px;border-bottom:1px solid var(--line);display:flex;align-items:flex-start;gap:12px}
  .sheet-head .ic{font-size:28px}
  .sheet-head h3{margin:0;font-size:19px;font-weight:800;color:var(--cedar-deep)}
  .sheet-head p{margin:2px 0 0;font-size:13px;color:var(--ink-soft)}
  .sheet-close{margin-right:auto;background:none;border:1px solid var(--line);width:34px;height:34px;border-radius:50%;font-size:18px;cursor:pointer;color:var(--ink-soft);flex:0 0 auto}
  .sheet-body{padding:16px 20px 26px;overflow-y:auto}

  .detail-img{width:100%;max-height:260px;object-fit:cover;border-radius:var(--r-sm);border:1px solid var(--line);margin-bottom:14px;cursor:zoom-in;display:block}
  .updated{font-size:11.5px;color:var(--ink-soft);margin:-4px 2px 12px}
  .act-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
  .act{display:inline-flex;align-items:center;gap:6px;border:1px solid var(--line-strong);background:var(--card);color:var(--cedar-deep);border-radius:10px;padding:9px 12px;font-family:inherit;font-weight:700;font-size:13px;cursor:pointer}
  .act.wa{background:var(--wa);color:#fff;border-color:var(--wa)}
  .act.on{background:var(--cedar);color:#fff;border-color:var(--cedar)}

  .progress{display:flex;align-items:center;gap:10px;background:var(--card);border:1px solid var(--line);border-radius:var(--r-sm);padding:10px 12px;margin-bottom:14px}
  .progress .bar{flex:1;height:8px;border-radius:99px;background:var(--paper-2);overflow:hidden}
  .progress .bar i{display:block;height:100%;width:0;background:linear-gradient(90deg,var(--cedar),var(--cedar-2));transition:width .25s}
  .progress span{font-size:13px;font-weight:700;color:var(--cedar)}
  .blk-title{font-size:13px;font-weight:800;color:var(--cedar-deep);margin:18px 2px 8px;display:flex;align-items:center;gap:7px}
  .blk-title::before{content:"";width:7px;height:7px;border-radius:2px;background:var(--brass)}

  ul.docs{list-style:none;margin:0;padding:0;display:flex;flex-direction:column;gap:8px}
  ul.docs li{display:flex;gap:11px;align-items:flex-start;background:var(--card);border:1px solid var(--line);border-radius:var(--r-sm);padding:11px 13px;cursor:pointer}
  ul.docs li .chk{flex:0 0 auto;width:22px;height:22px;border-radius:7px;border:2px solid var(--line-strong);display:grid;place-items:center;color:#fff;font-size:13px;margin-top:1px}
  ul.docs li.done{border-color:rgba(31,122,69,.4);background:rgba(31,122,69,.06)}
  ul.docs li.done .chk{background:var(--ok);border-color:var(--ok)}
  ul.docs li.done .txt{color:var(--ink-soft)}
  ul.docs li .txt{font-size:14.5px}
  ol.steps{margin:0;padding:0;list-style:none;counter-reset:st}
  ol.steps li{counter-increment:st;position:relative;padding:9px 40px 9px 0;font-size:14px;color:var(--ink)}
  ol.steps li::before{content:counter(st);position:absolute;right:0;top:8px;width:26px;height:26px;border-radius:50%;background:var(--cedar);color:#fff;font-size:13px;font-weight:800;display:grid;place-items:center}
  ul.notes{list-style:none;margin:0;padding:0;display:flex;flex-direction:column;gap:6px}
  ul.notes li{position:relative;padding-right:18px;font-size:13.5px;color:var(--ink-soft)}
  ul.notes li::before{content:"•";position:absolute;right:0;color:var(--brass);font-weight:900}
  .fee{display:inline-flex;align-items:center;gap:8px;background:rgba(176,132,44,.12);border:1px solid rgba(176,132,44,.3);color:#7a5a18;border-radius:999px;padding:7px 14px;font-size:13.5px;font-weight:700;margin-top:4px}
  .alert{margin-top:16px;border:1.5px solid var(--danger-line);background:var(--danger-bg);border-radius:var(--r-sm);padding:14px;position:relative;overflow:hidden}
  .alert::after{content:"تنبيه";position:absolute;top:-6px;left:-22px;transform:rotate(-20deg);background:var(--danger);color:#fff;font-size:11px;font-weight:800;padding:14px 24px 4px;opacity:.9}
  .alert h4{margin:0 0 8px;color:var(--danger);font-size:15px;font-weight:800}
  .alert ul{list-style:none;margin:0;padding:0;display:flex;flex-direction:column;gap:7px}
  .alert li{position:relative;padding-right:18px;font-size:13.5px;color:#5e2424}
  .alert li::before{content:"◂";position:absolute;right:0;color:var(--danger);font-size:11px;top:4px}

  .big-opts{display:flex;flex-direction:column;gap:10px}
  .big-opt{display:flex;align-items:center;gap:12px;background:var(--card);border:1.5px solid var(--line-strong);border-radius:14px;padding:14px 16px;font-family:inherit;font-weight:700;font-size:15.5px;color:var(--ink);cursor:pointer;text-align:right}
  .big-opt:hover{border-color:var(--cedar-2);background:rgba(31,122,69,.05)}
  .big-opt .e{font-size:22px}
  .calc-row{display:flex;align-items:center;gap:10px;background:var(--card);border:1px solid var(--line);border-radius:var(--r-sm);padding:11px 13px;margin-bottom:8px;cursor:pointer}
  .calc-row .chk{width:22px;height:22px;border-radius:7px;border:2px solid var(--line-strong);display:grid;place-items:center;color:#fff;font-size:13px}
  .calc-row.on{border-color:rgba(31,122,69,.4);background:rgba(31,122,69,.06)}
  .calc-row.on .chk{background:var(--ok);border-color:var(--ok)}
  .calc-row .nm{flex:1;font-size:14.5px}
  .calc-row .am{font-weight:800;color:var(--cedar-deep);font-size:14px}
  .calc-total{display:flex;justify-content:space-between;align-items:center;margin-top:14px;padding:14px 16px;background:var(--cedar-deep);color:#fff;border-radius:var(--r-sm);font-weight:800;font-size:17px}
  .qr-box{display:flex;flex-direction:column;align-items:center;gap:12px;padding:8px}
  .qr-box #qr{padding:12px;background:#fff;border-radius:12px;border:1px solid var(--line)}
  .res{background:var(--card);border:1px solid var(--line);border-radius:var(--r-sm);padding:14px;margin-top:12px;text-align:center}
  .res .big{font-size:26px;font-weight:900;color:var(--cedar-deep)}
  .res.late .big{color:var(--danger)}

  .foot{margin:34px 0 10px;padding-top:18px;border-top:1px solid var(--line);text-align:center;color:var(--ink-soft);font-size:12.5px}
  .foot b{color:var(--cedar-deep)}

  .fab{position:fixed;left:16px;bottom:18px;z-index:40;height:56px;padding:0 20px 0 18px;border-radius:999px;background:linear-gradient(135deg,var(--cedar),var(--cedar-2));color:#fff;border:none;cursor:pointer;display:flex;align-items:center;gap:10px;font-family:inherit;font-weight:700;font-size:15px;box-shadow:0 14px 30px -10px rgba(13,58,32,.6)}
  .fab .ring{width:26px;height:26px;border-radius:50%;background:rgba(255,255,255,.18);display:grid;place-items:center;font-size:15px}
  body.chat-open .fab{display:none}
  .chat{position:fixed;z-index:70;left:0;right:0;bottom:0;height:min(86vh,640px);background:var(--paper);border-radius:22px 22px 0 0;box-shadow:0 -16px 50px -12px rgba(13,58,32,.5);display:flex;flex-direction:column;transform:translateY(110%);transition:transform .3s cubic-bezier(.2,.8,.2,1);pointer-events:none}
  body.chat-open .chat{transform:translateY(0);pointer-events:auto}
  @media(min-width:680px){.chat{left:auto;right:24px;width:400px;border-radius:22px;bottom:24px}}
  .chat-head{display:flex;align-items:center;gap:12px;padding:16px 18px;background:linear-gradient(135deg,var(--cedar-deep),var(--cedar));color:#fff;border-radius:22px 22px 0 0}
  .chat-head .av{width:40px;height:40px;border-radius:50%;background:rgba(255,255,255,.15);display:grid;place-items:center;font-size:20px}
  .chat-head h4{margin:0;font-size:16px;font-weight:800}
  .chat-head .st{font-size:12px;opacity:.85;display:flex;align-items:center;gap:6px}
  .chat-head .st .live{width:7px;height:7px;border-radius:50%;background:#6ee7a0}
  .chat-head .hwa{margin-right:auto;background:var(--wa);border:none;color:#fff;width:36px;height:36px;border-radius:50%;font-size:17px;cursor:pointer;display:none;place-items:center}
  body.has-wa .chat-head .hwa{display:grid}
  .chat-head .x{background:rgba(255,255,255,.12);border:none;color:#fff;width:34px;height:34px;border-radius:50%;font-size:18px;cursor:pointer;margin-right:8px}
  body:not(.has-wa) .chat-head .x{margin-right:auto}
  .chat-body{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:12px}
  .msg{max-width:84%;padding:11px 14px;border-radius:16px;font-size:14.5px;line-height:1.55;white-space:pre-wrap;word-break:break-word}
  .msg.bot{align-self:flex-start;background:var(--card);border:1px solid var(--line);border-bottom-right-radius:5px}
  .msg.me{align-self:flex-end;background:linear-gradient(135deg,var(--cedar),var(--cedar-2));color:#fff;border-bottom-left-radius:5px}
  .msg.bot b{color:var(--cedar-deep)}
  .typing{align-self:flex-start;background:var(--card);border:1px solid var(--line);padding:13px 16px;border-radius:16px;display:flex;gap:5px}
  .typing i{width:7px;height:7px;border-radius:50%;background:var(--cedar-2);opacity:.5;animation:bob 1.2s infinite}
  .typing i:nth-child(2){animation-delay:.2s}.typing i:nth-child(3){animation-delay:.4s}
  @keyframes bob{0%,60%,100%{transform:translateY(0);opacity:.4}30%{transform:translateY(-5px);opacity:1}}
  .chips{display:flex;flex-wrap:wrap;gap:8px;padding:0 16px 8px}
  .chip{background:var(--card);border:1px solid var(--line-strong);color:var(--cedar-deep);border-radius:999px;padding:7px 13px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit}
  .chip.wa{background:var(--wa);color:#fff;border-color:var(--wa)}
  .chip.cmp{background:var(--brass);color:#fff;border-color:var(--brass)}
  .chat-in{display:flex;gap:9px;padding:12px 14px;border-top:1px solid var(--line);background:var(--paper)}
  .chat-in input{flex:1;border:1.5px solid var(--line-strong);background:var(--card);border-radius:999px;padding:12px 16px;font-family:inherit;font-size:15px;outline:none;color:var(--ink)}
  .chat-in button{flex:0 0 auto;width:46px;height:46px;border-radius:50%;border:none;background:linear-gradient(135deg,var(--cedar),var(--cedar-2));color:#fff;font-size:19px;cursor:pointer;display:grid;place-items:center}

  .admin-bar{display:none;gap:8px;flex-wrap:wrap;margin:14px 0 0;padding:12px;background:var(--cedar-deep);border-radius:var(--r-sm);align-items:center}
  body.admin .admin-bar{display:flex}
  .admin-bar .lbl{color:#cdeedd;font-size:13px;font-weight:700;margin-left:auto}
  .abtn{background:rgba(255,255,255,.12);color:#fff;border:1px solid rgba(255,255,255,.2);border-radius:9px;padding:8px 12px;font-size:12.5px;font-weight:700;cursor:pointer;font-family:inherit}
  .abtn.pub{background:var(--brass);border-color:var(--brass)}
  .abtn.add{background:var(--cedar-2);border-color:var(--cedar-2)}
  .abtn.exit{background:#fff;color:var(--cedar-deep)}

  .form-row{margin-bottom:13px}
  .form-row label{display:block;font-size:13px;font-weight:700;color:var(--cedar-deep);margin-bottom:5px}
  .form-row input,.form-row textarea,.form-row select{width:100%;border:1.5px solid var(--line-strong);background:#fff;border-radius:10px;padding:10px 12px;font-family:inherit;font-size:14.5px;color:var(--ink);outline:none;resize:vertical}
  .form-row textarea{min-height:80px;line-height:1.5}
  .form-row .hint{font-size:11.5px;color:var(--ink-soft);margin-top:4px}
  .two{display:flex;gap:10px}.two>div{flex:1}
  .days{display:flex;gap:6px;flex-wrap:wrap}
  .day{padding:7px 11px;border:1.5px solid var(--line-strong);border-radius:9px;font-size:13px;font-weight:700;cursor:pointer;background:#fff}
  .day.on{background:var(--cedar);color:#fff;border-color:var(--cedar)}

function normalizeData(d){
  const base=JSON.parse(JSON.stringify(DEFAULT_DATA));
  if(!d||typeof d!=="object") return base;
  const out={};
  out.office=Object.assign({}, base.office, (d.office&&typeof d.office==="object")?d.office:{});
  if(!Array.isArray(out.office.openDays)) out.office.openDays=base.office.openDays.slice();
  if(!Array.isArray(out.office.fees)) out.office.fees=[];
  out.office.fees=out.office.fees.filter(f=>f&&f.name).map(f=>({name:String(f.name), amount:Number(f.amount)||0}));
  if(!out.office.announcement||typeof out.office.announcement!=="object") out.office.announcement={on:false,text:""};
  if(!out.office.transparency||typeof out.office.transparency!=="object") out.office.transparency=JSON.parse(JSON.stringify(base.office.transparency));
  out.cats=(Array.isArray(d.cats)&&d.cats.length)?d.cats.filter(c=>c&&c.id).map(c=>({id:String(c.id),label:String(c.label||c.id)})):JSON.parse(JSON.stringify(base.cats));
  if(!out.cats.length) out.cats=JSON.parse(JSON.stringify(base.cats));
  out.services=Array.isArray(d.services)?d.services.filter(s=>s&&s.id&&s.title).map(s=>({
    id:String(s.id), cat:String(s.cat||out.cats[0].id), icon:s.icon||"📄", title:String(s.title), subtitle:String(s.subtitle||""),
    fee:String(s.fee||""), image:(typeof s.image==="string"?s.image:""), updated:String(s.updated||""),
    keywords:Array.isArray(s.keywords)?s.keywords.map(String):[], docs:Array.isArray(s.docs)?s.docs.map(String):[],
    notes:Array.isArray(s.notes)?s.notes.map(String):[], steps:Array.isArray(s.steps)?s.steps.map(String):[],
    warning:(s.warning&&s.warning.title&&Array.isArray(s.warning.items)&&s.warning.items.length)?{title:String(s.warning.title),items:s.warning.items.map(String)}:null
  })):JSON.parse(JSON.stringify(base.services));
  const catIds=out.cats.map(c=>c.id); out.services.forEach(s=>{ if(!catIds.includes(s.cat)) s.cat=out.cats[0].id; });
  if(!out.services.length) out.services=JSON.parse(JSON.stringify(base.services));
  return out;
}
function loadDataSyncFallback(){ try{ const raw=localStorage.getItem(LS_KEY); if(raw) return normalizeData(JSON.parse(raw)); }catch(e){} return normalizeData(DEFAULT_DATA); }

/* ===== التخزين عبر IndexedDB (مساحة كبيرة للصور) ===== */
const IDB_NAME="mukhtar_db", IDB_STORE="kv", IDB_KEY="data_v4";
let _idbReady=null;
function idbOpen(){ if(_idbReady) return _idbReady; _idbReady=new Promise((res,rej)=>{ if(!window.indexedDB){ rej(new Error("no-idb")); return; } const r=indexedDB.open(IDB_NAME,1); r.onupgradeneeded=()=>{ if(!r.result.objectStoreNames.contains(IDB_STORE)) r.result.createObjectStore(IDB_STORE); }; r.onsuccess=()=>res(r.result); r.onerror=()=>rej(r.error); }); return _idbReady; }
function idbGet(key){ return idbOpen().then(db=>new Promise((res,rej)=>{ const t=db.transaction(IDB_STORE,"readonly").objectStore(IDB_STORE).get(key); t.onsuccess=()=>res(t.result); t.onerror=()=>rej(t.error); })); }
function idbSet(key,val){ return idbOpen().then(db=>new Promise((res,rej)=>{ const tx=db.transaction(IDB_STORE,"readwrite"); tx.objectStore(IDB_STORE).put(val,key); tx.oncomplete=()=>res(true); tx.onerror=()=>rej(tx.error); })); }

async function loadDataAsync(){
  try{
    const fromIdb=await idbGet(IDB_KEY);
    if(fromIdb) return normalizeData(fromIdb);
    // ترحيل تلقائي من النسخة القديمة (localStorage) لمرة واحدة
    const raw=localStorage.getItem(LS_KEY);
    if(raw){ const d=normalizeData(JSON.parse(raw)); try{ await idbSet(IDB_KEY,d); localStorage.removeItem(LS_KEY); }catch(e){} return d; }
  }catch(e){ return loadDataSyncFallback(); }
  return normalizeData(DEFAULT_DATA);
}

/* ===== PWA: أيقونة + manifest + service worker ===== */
function drawIcon(size){
  const c=document.createElement("canvas"); c.width=c.height=size; const x=c.getContext("2d"); const s=size/200;
  x.fillStyle="#15532E"; x.fillRect(0,0,size,size);
  x.strokeStyle="#B0842C"; x.lineWidth=4*s; x.beginPath(); x.arc(100*s,100*s,86*s,0,Math.PI*2); x.stroke();
  x.fillStyle="#F6F2E8"; x.fillRect(96*s,120*s,8*s,24*s);
  function tri(y,w){ x.beginPath(); x.moveTo(100*s,y*s); x.lineTo((100+w)*s,(y+26)*s); x.lineTo((100-w)*s,(y+26)*s); x.closePath(); x.fill(); }
  tri(66,21); tri(82,30); tri(98,37); return c.toDataURL("image/png");
}

function waDigits(num){ let d=(num||"").replace(/\D/g,""); if(d.startsWith("00")) d=d.slice(2); if(d.startsWith("0")) d=d.slice(1); if(d&&d.length<=8) d="961"+d; return d; }
function openWhatsApp(text){ const d=waDigits(DATA.office.whatsapp); if(!d){ alert("لم يتم تحديد رقم واتساب. أدخله من «المكتب»."); return; } window.open("https://wa.me/"+d+(text?("?text="+encodeURIComponent(text)):""),"_blank"); }
function shareOnWhatsApp(text){ window.open("https://wa.me/?text="+encodeURIComponent(text),"_blank"); }

/* ===== أوقات الدوام / الحالة ===== */
function parseHM(s){ const p=(s||"0:0").split(":"); return (parseInt(p[0],10)||0)*60+(parseInt(p[1],10)||0); }
function officeOpenNow(){ const o=DATA.office; if(!o.openDays||!o.openDays.length||!o.openTime||!o.closeTime) return null; const n=new Date(); const m=n.getHours()*60+n.getMinutes(); return o.openDays.includes(n.getDay()) && m>=parseHM(o.openTime) && m<parseHM(o.closeTime); }

const board=document.getElementById("board");
function renderBoard(filter=""){ try{ renderBoardInner(filter); }catch(e){ board.innerHTML=`<div class="recover"><h3>صار خلل بالعرض</h3><p>في مشكلة بالبيانات. ترجّع النسخة الأصلية بأمان.</p><button onclick="(function(){DATA=normalizeData(DEFAULT_DATA);saveData();applyHeader();renderBoard();})()">↺ استرجاع الأصل</button></div>`; } }
function renderBoardInner(filter){
  const f=norm(filter); board.innerHTML="";
  DATA.cats.forEach(cat=>{
    let svcs=DATA.services.filter(s=>s.cat===cat.id);
    if(f){ svcs=svcs.filter(s=>{ const hay=norm(s.title+" "+s.subtitle+" "+(s.keywords||[]).join(" ")+" "+(s.docs||[]).join(" ")); return f.split(" ").every(w=>hay.includes(w)); }); }
    const showAdd=document.body.classList.contains("admin")&&!f;
    if(!svcs.length&&!showAdd) return;
    const sec=document.createElement("section"); sec.className="section";
    sec.innerHTML=`<div class="eyebrow"><span class="dot"></span><h2>${escapeHtml(cat.label)}</h2><span class="rule"></span></div>`;
    const grid=document.createElement("div"); grid.className="grid";
    svcs.forEach(s=>{ const w=!!s.warning; const card=document.createElement("div"); card.className="card"+(w?" warn":"");
      card.innerHTML=`<button class="edit-btn" data-edit="${s.id}">✎</button><span class="ic">${s.icon||"📄"}</span><h3>${escapeHtml(s.title)}</h3><p>${escapeHtml(s.subtitle||"")}</p><div class="meta"><span class="pill${w?" danger":""}">${w?"⏳ مهلة قانونية":((s.docs?s.docs.length:0)+" مستندات")}</span>${s.image?'<span class="pill img">🖼️ صورة</span>':''}</div>`;
      card.addEventListener("click",(e)=>{ if(e.target.closest("[data-edit]")) return; openService(s.id); }); grid.appendChild(card); });
    if(showAdd){ const add=document.createElement("div"); add.className="add-card"; add.textContent="➕ إضافة معاملة"; add.addEventListener("click",()=>openAddService(cat.id)); grid.appendChild(add); }
    sec.appendChild(grid); board.appendChild(sec);
  });
  if(!board.children.length){ board.innerHTML=`<div style="text-align:center;color:var(--ink-soft);padding:40px 10px"><div style="font-size:38px;margin-bottom:8px">🗂️</div>ما في معاملة بهالاسم. جرّب «شو وضعك؟» أو اسأل المساعد.</div>`; }
  board.querySelectorAll("[data-edit]").forEach(b=>b.addEventListener("click",(e)=>{ e.stopPropagation(); openEditService(b.dataset.edit); }));
}

function openService(id){
  const s=DATA.services.find(x=>x.id===id); if(!s) return; setHead(s.icon||"📄", s.title, s.subtitle||"");
  let html=""; const docs=s.docs||[];
  if(s.image) html+=`<img class="detail-img no-print" src="${s.image}" alt="صورة المعاملة" data-zoom>`;
  if(s.updated) html+=`<div class="updated">🗓️ آخر تحديث: ${escapeHtml(s.updated)}</div>`;
  html+=`<div class="act-row no-print">`;
  if(window.speechSynthesis) html+=`<button class="act" id="ttsBtn">🔊 استماع</button>`;
  html+=`<button class="act" id="prtBtn">🖨️ اطبع</button>`;
  html+=`<button class="act" id="shrBtn">↗️ ابعت ع واتساب</button>`;
  if(waDigits(DATA.office.whatsapp)) html+=`<button class="act wa" id="askWa">📲 اسأل المختار</button>`;
  html+=`</div>`;
  if(docs.length){ html+=`<div class="progress no-print"><div class="bar"><i id="pgBar"></i></div><span id="pgTxt">0 / ${docs.length}</span></div><div class="blk-title">المستندات المطلوبة</div><ul class="docs">`; docs.forEach((d,i)=>html+=`<li data-i="${i}"><span class="chk">✓</span><span class="txt">${escapeHtml(d)}</span></li>`); html+=`</ul>`; }
  if(s.steps&&s.steps.length){ html+=`<div class="blk-title">مسار المعاملة</div><ol class="steps">`; s.steps.forEach(st=>html+=`<li>${escapeHtml(st)}</li>`); html+=`</ol>`; }
  if(s.fee){ html+=`<div class="blk-title">الرسوم</div><span class="fee">💰 ${escapeHtml(s.fee)}</span>`; }
  if(s.notes&&s.notes.length){ html+=`<div class="blk-title">ملاحظات</div><ul class="notes">`; s.notes.forEach(n=>html+=`<li>${escapeHtml(n)}</li>`); html+=`</ul>`; }
  if(s.warning){ html+=`<div class="alert"><h4>⚠️ ${escapeHtml(s.warning.title)}</h4><ul>`; s.warning.items.forEach(it=>html+=`<li>${escapeHtml(it)}</li>`); html+=`</ul></div>`; }
  shBody.innerHTML=html;
  const zoom=shBody.querySelector("[data-zoom]"); if(zoom) zoom.addEventListener("click",()=>openLightbox(s.image));
  const aw=shBody.querySelector("#askWa"); if(aw) aw.addEventListener("click",()=>openWhatsApp("مرحبا، بدي استفسر عن معاملة: "+s.title+" 🙏"));
  const sh=shBody.querySelector("#shrBtn"); if(sh) sh.addEventListener("click",()=>shareOnWhatsApp(serviceAsText(s)));
  const pr=shBody.querySelector("#prtBtn"); if(pr) pr.addEventListener("click",()=>{ document.body.classList.add("print-sheet"); window.print(); setTimeout(()=>document.body.classList.remove("print-sheet"),500); });
  const tt=shBody.querySelector("#ttsBtn"); if(tt) tt.addEventListener("click",()=>toggleSpeak(serviceAsText(s), tt));
  const lis=shBody.querySelectorAll("ul.docs li"), bar=shBody.querySelector("#pgBar"), txt=shBody.querySelector("#pgTxt");
  function refresh(){ const done=shBody.querySelectorAll("ul.docs li.done").length; if(bar) bar.style.width=(lis.length?(done/lis.length*100):0)+"%"; if(txt) txt.textContent=done+" / "+lis.length; }
  lis.forEach(li=>li.addEventListener("click",()=>{ li.classList.toggle("done"); refresh(); })); refresh(); openSheet();
}
function serviceAsText(s){
  let t=s.title+"\n\nالمستندات المطلوبة:\n"; (s.docs||[]).forEach(d=>t+="• "+d+"\n");
  if(s.steps&&s.steps.length){ t+="\nمسار المعاملة:\n"; s.steps.forEach((st,i)=>t+=(i+1)+". "+st+"\n"); }
  if(s.fee) t+="\nالرسوم: "+s.fee;
  if(s.notes&&s.notes.length){ t+="\n\nملاحظات:\n"; s.notes.forEach(n=>t+="- "+n+"\n"); }
  if(s.warning){ t+="\n⚠️ "+s.warning.title+":\n"; s.warning.items.forEach(it=>t+="• "+it+"\n"); }
  t+="\n— "+(DATA.office.name||"مكتب المختار"); return t;
}

/* ===== قراءة صوتية (TTS) ===== */
let speaking=false, speakBtnRef=null;
function stopSpeak(){ try{ window.speechSynthesis&&window.speechSynthesis.cancel(); }catch(e){} speaking=false; if(speakBtnRef){ speakBtnRef.classList.remove("on"); speakBtnRef.textContent="🔊 استماع"; speakBtnRef=null; } }
function toggleSpeak(text, btn){
  if(!window.speechSynthesis) return;
  if(speaking){ stopSpeak(); return; }
  const u=new SpeechSynthesisUtterance(text); u.lang="ar-SA"; u.rate=.95;
  const voices=window.speechSynthesis.getVoices(); const av=voices.find(v=>/ar/i.test(v.lang)); if(av) u.voice=av;
  u.onend=()=>stopSpeak(); window.speechSynthesis.speak(u);
  speaking=true; speakBtnRef=btn; btn.classList.add("on"); btn.textContent="⏹️ إيقاف";
}

/* ===== 🔎 تتبّع طلبك (للمواطن — بدون حساب) ===== */
async function fetchTrack(id){
  if(!db) return {err:"offline"};
  for(const coll of ["appointments","complaints"]){
    try{ const doc=await db.collection(coll).doc(id).get(); if(doc.exists) return {coll, d:doc.data()}; }
    catch(e){ if(e&&e.code==="permission-denied") return {err:"rules"}; }
  }
  return {err:"notfound"};
}
function trackCardHTML(coll,d){
  const st=d.status||"جديد", cls=statusClass(st);
  const icon= st==="منجز"?"🟢": (st==="قيد المعالجة"?"🔵":"🟡");
  let inner="";
  if(coll==="appointments"){ inner=`<div class="line"><b>المعاملة:</b> ${escapeHtml(d.service||"-")}</div><div class="line"><b>التاريخ:</b> ${escapeHtml(d.date||"-")} ${d.time?("• "+escapeHtml(d.time)):""}</div>`; }
  else { inner=`<div class="line"><b>النوع:</b> ${escapeHtml(d.type||"-")}</div><div class="line"><b>الموضوع:</b> ${escapeHtml(d.subject||"-")}</div>`; }
  return `<div class="req ${cls}"><h4>${coll==="appointments"?"📅 موعد":"📝 طلب"}</h4><div class="when">قُدّم: ${tsText(d.createdAt)}</div>${inner}
    <div style="margin-top:10px;padding:10px 12px;border-radius:10px;font-weight:800;text-align:center" class="stsel ${cls}">${icon} الحالة: ${escapeHtml(st)}</div></div>`;
}
async function openTrack(prefill){
  closeChat(); setHead("🔎","تتبّع طلبك","حط رقم المتابعة وشوف حالة معاملتك");
  let mine=[]; try{ mine=JSON.parse(localStorage.getItem(LS_TRACK)||"[]"); }catch(e){}
  const mineHtml = mine.length? `<div class="blk-title">طلباتك من هذا الجهاز</div><div class="big-opts" style="margin-bottom:14px">${mine.map((m,i)=>`<button class="big-opt" data-mine="${i}" style="font-size:13.5px;padding:11px 14px"><span class="e">🎫</span><span style="direction:ltr;font-family:monospace;font-size:12px">${escapeHtml(m.id.slice(0,10))}…</span></button>`).join("")}</div>`:"";
  shBody.innerHTML=`
    <div class="form-row"><label>رقم المتابعة</label><input id="trkIn" style="direction:ltr;font-family:monospace" placeholder="مثال: aB3xY9..." value="${escAttr(prefill||"")}"></div>
    <button class="act on" id="trkGo" style="width:100%;justify-content:center;padding:13px;font-size:15px">🔎 اعرض الحالة</button>
    <div id="trkRes" style="margin-top:14px"></div>
    ${mineHtml}`;
  openSheet();
  const res=document.getElementById("trkRes");
  async function go(id){
    if(!id){ alert("حط رقم المتابعة."); return; }
    res.innerHTML=`<div class="empty-dash"><span class="e">⏳</span>عم نبحث...</div>`;
    const r=await fetchTrack(id.trim());
    if(r.err==="offline"){ res.innerHTML=`<div class="empty-dash"><span class="e">📡</span>ما في اتصال بقاعدة البيانات. تأكد من الإنترنت.</div>`; return; }
    if(r.err==="rules"){ res.innerHTML=`<div class="empty-dash"><span class="e">⚠️</span>التتبّع مش مفعّل بعد — لازم المختار يحدّث قواعد الأمان.</div>`; return; }
    if(r.err==="notfound"){ res.innerHTML=`<div class="empty-dash"><span class="e">🤔</span>ما لقينا طلب بهالرقم. تأكد من الرقم كامل.</div>`; return; }
    res.innerHTML=trackCardHTML(r.coll, r.d);
  }
  document.getElementById("trkGo").addEventListener("click",()=>go(val("trkIn")));
  document.getElementById("trkIn").addEventListener("keydown",e=>{ if(e.key==="Enter") go(val("trkIn")); });
  shBody.querySelectorAll("[data-mine]").forEach(b=>b.addEventListener("click",()=>{ const m=mine[+b.dataset.mine]; document.getElementById("trkIn").value=m.id; go(m.id); }));
  if(prefill) go(prefill);
}

/* ===== لوحة تحكم المختار (Firestore + Auth) ===== */
let dashUnsub=null, dashTab="appointments";
function detachDash(){ if(dashUnsub){ try{ dashUnsub(); }catch(e){} dashUnsub=null; } }
const STATUSES=["جديد","قيد المعالجة","منجز"];
function statusClass(s){ return s==="منجز"?"s-done":(s==="قيد المعالجة"?"s-prog":"s-new"); }
function tsText(ts){ try{ if(ts&&ts.toDate) return ts.toDate().toLocaleString("ar-EG-u-nu-latn",{dateStyle:"medium",timeStyle:"short"}); }catch(e){} return "—"; }
function openDashboard(){
  setHead("📊","الطلبات والمواعيد","لوحة المختار");
  if(!db){ shBody.innerHTML=`<div class="fb-badge off">● غير متصل بـ Firebase</div><p style="color:var(--ink-soft)">ما قدرنا نتصل بقاعدة البيانات. تأكد من الإنترنت وأعد المحاولة.</p>`; openSheet(); return; }
  if(!auth||!auth.currentUser){ openAdminLogin(()=>openDashboard()); return; }
  openSheet(); renderDash();
}
function renderDash(){
  shBody.innerHTML=`
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px"><span class="fb-badge on" style="margin:0">● ${escapeHtml((auth.currentUser&&auth.currentUser.email)||'المختار')}</span><button class="signout" id="soBtn">تسجيل خروج</button></div>
    <div class="tabs"><button class="tab" id="tabAp">📅 المواعيد <span class="badge" id="cntAp">0</span></button><button class="tab" id="tabCm">📝 الشكاوى <span class="badge" id="cntCm">0</span></button></div>
    <div id="dashList"></div>`;
  document.getElementById("soBtn").addEventListener("click",async ()=>{ detachDash(); try{ await auth.signOut(); }catch(e){} leaveAdmin(); closeSheet(); });
  document.getElementById("tabAp").addEventListener("click",()=>{ dashTab="appointments"; switchTab(); });
  document.getElementById("tabCm").addEventListener("click",()=>{ dashTab="complaints"; switchTab(); });
  switchTab();
}
function switchTab(){
  const a=document.getElementById("tabAp"), c=document.getElementById("tabCm");
  if(a) a.classList.toggle("on",dashTab==="appointments");
  if(c) c.classList.toggle("on",dashTab==="complaints");
  listenColl(dashTab);
}
function listenColl(coll){
  detachDash();
  const list=document.getElementById("dashList"); if(!list) return;
  list.innerHTML=`<div class="empty-dash"><span class="e">⏳</span>عم نحمّل...</div>`;
  try{
    dashUnsub=db.collection(coll).orderBy("createdAt","desc").onSnapshot((snap)=>{
      const cntEl=document.getElementById(coll==="appointments"?"cntAp":"cntCm"); if(cntEl) cntEl.textContent=snap.size;
      if(snap.empty){ list.innerHTML=`<div class="empty-dash"><span class="e">📭</span>ما في ${coll==="appointments"?"مواعيد":"شكاوى"} بعد.</div>`; return; }
      let html=""; snap.forEach(doc=>{ html+=renderReq(coll,doc.id,doc.data()); });
      list.innerHTML=html;
      list.querySelectorAll("[data-st]").forEach(sel=>sel.addEventListener("change",()=>{ sel.className="stsel "+statusClass(sel.value); db.collection(coll).doc(sel.dataset.st).update({status:sel.value}).catch(()=>alert("تعذّر التحديث.")); }));
      list.querySelectorAll("[data-del]").forEach(b=>b.addEventListener("click",()=>{ if(confirm("حذف هذا الطلب نهائياً؟")) db.collection(coll).doc(b.dataset.del).delete().catch(()=>alert("تعذّر الحذف.")); }));
    },(err)=>{
      const code=(err&&err.code)||"unknown";
      let hint="تأكد من الإنترنت وأعد المحاولة.";
      if(code==="permission-denied") hint="قواعد الأمان رفضت القراءة — تأكد إن بريد الدخول هو نفسه المكتوب في الـ Rules.";
      list.innerHTML=`<div class="empty-dash"><span class="e">⚠️</span>تعذّر تحميل البيانات.<br><span style="font-size:12px">${escapeHtml(hint)}</span><br><span style="font-size:11px;color:var(--ink-soft)">(${escapeHtml(code)})</span></div>`;
    });
  }catch(e){
    list.innerHTML=`<div class="empty-dash"><span class="e">⚠️</span>صار خطأ غير متوقع.<br><span style="font-size:11px">${escapeHtml(String(e&&e.message||e))}</span></div>`;
  }
}
function renderReq(coll,id,d){
  const st=d.status||"جديد", cls=statusClass(st);
  const sel=`<select class="stsel ${cls}" data-st="${id}">${STATUSES.map(s=>`<option${s===st?' selected':''}>${s}</option>`).join("")}</select>`;
  const waBtn=d.phone?`<a class="rwa" href="https://wa.me/${waDigits(d.phone)}" target="_blank">📲 رد</a>`:"";
  const del=`<button class="rdel" data-del="${id}">🗑️</button>`;
  if(coll==="appointments"){
    return `<div class="req ${cls}"><h4>📅 ${escapeHtml(d.service||"موعد")}</h4><div class="when">${tsText(d.createdAt)}</div>`+
      `<div class="line"><b>التاريخ:</b> ${escapeHtml(d.date||"-")} ${d.time?("• "+escapeHtml(d.time)):""}</div>`+
      `<div class="line"><b>الاسم:</b> ${escapeHtml(d.name||"-")} • <b>الهاتف:</b> ${escapeHtml(d.phone||"-")}</div>`+
      (d.note?`<div class="det">${escapeHtml(d.note)}</div>`:"")+
      `<div class="foot">${sel}${waBtn}${del}</div></div>`;
  }
  return `<div class="req ${cls}"><h4>📝 ${escapeHtml(d.subject||d.type||"شكوى")}</h4><div class="when">${escapeHtml(d.type||"")} • ${tsText(d.createdAt)}</div>`+
    `<div class="line"><b>الاسم:</b> ${escapeHtml(d.name||"-")} • <b>الهاتف:</b> ${escapeHtml(d.phone||"-")}</div>`+
    (d.details?`<div class="det">${escapeHtml(d.details)}</div>`:"")+
    `<div class="foot">${sel}${waBtn}${del}</div></div>`;
}

/* ===== احسب مهلتك (تذكير + تقويم) ===== */
function pad(n){ return (n<10?"0":"")+n; }
function icsDate(d){ return d.getUTCFullYear()+pad(d.getUTCMonth()+1)+pad(d.getUTCDate())+"T"+pad(d.getUTCHours())+pad(d.getUTCMinutes())+"00Z"; }
function downloadICS(title, dateObj, desc){
  const end=new Date(dateObj.getTime()+3600000);
  const ics=["BEGIN:VCALENDAR","VERSION:2.0","PRODID:-//mukhtar//ar","BEGIN:VEVENT","UID:"+Date.now()+"@mukhtar","DTSTAMP:"+icsDate(new Date()),"DTSTART:"+icsDate(dateObj),"DTEND:"+icsDate(end),"SUMMARY:"+title,"DESCRIPTION:"+(desc||""),"BEGIN:VALARM","TRIGGER:-P7D","ACTION:DISPLAY","DESCRIPTION:"+title,"END:VALARM","END:VEVENT","END:VCALENDAR"].join("\r\n");
  const a=document.createElement("a"); a.href=URL.createObjectURL(new Blob([ics],{type:"text/calendar"})); a.download="reminder.ics"; a.click();
}
function gcalLink(title, dateObj, desc){ const s=icsDate(dateObj), e=icsDate(new Date(dateObj.getTime()+3600000)); return "https://calendar.google.com/calendar/render?action=TEMPLATE&text="+encodeURIComponent(title)+"&dates="+s+"/"+e+"&details="+encodeURIComponent(desc||""); }
function openDeadline(){
  closeChat(); setHead("⏰","احسب مهلتك","للولادة سنة، وللزواج شهر من التاريخ");
  shBody.innerHTML=`
    <div class="form-row"><label>نوع الحدث</label><select id="dType"><option value="birth">ولادة (مهلة سنة)</option><option value="marriage">زواج (مهلة شهر)</option></select></div>

  openSheet();
  document.getElementById("dCalc").addEventListener("click",()=>{

    const base=new Date(dv+"T00:00:00"); const dl=new Date(base);
    if(t==="birth") dl.setFullYear(dl.getFullYear()+1); else dl.setMonth(dl.getMonth()+1);
    const today=new Date(); today.setHours(0,0,0,0);

    const evName=(t==="birth"?"آخر مهلة لتسجيل المولود":"آخر مهلة لتسجيل الزواج");

    else { res.innerHTML=`<div class="res"><div class="big">${days} يوم</div><p>متبقّي على آخر مهلة. آخر موعد للتسجيل: <b>${escapeHtml(dlStr)}</b></p><div class="act-row" style="justify-content:center;margin-top:8px"><button class="act on" id="dIcs">➕ تذكير (تقويم)</button><a class="act" id="dG" target="_blank">📅 Google</a></div></div>`;
      const desc="تذكير من "+(DATA.office.name||"مكتب المختار");
      document.getElementById("dIcs").addEventListener("click",()=>downloadICS(evName, dl, desc));
      document.getElementById("dG").href=gcalLink(evName, dl, desc);
    }
    const dwa=document.getElementById("dWa"); if(dwa) dwa.addEventListener("click",()=>openWhatsApp("مرحبا، تجاوزت مهلة "+(t==="birth"?"تسجيل المولود":"تسجيل الزواج")+" وبدي استشارة 🙏"));
  });

/* ===== رفع الصور ===== */
let pendingImage=null;
function fileToDownscaled(file,cb){ const r=new FileReader(); r.onload=()=>{ const img=new Image(); img.onload=()=>{ const max=1200; let w=img.width,h=img.height; if(w>max||h>max){ if(w>h){h=Math.round(h*max/w);w=max;}else{w=Math.round(w*max/h);h=max;} } const c=document.createElement("canvas"); c.width=w;c.height=h; c.getContext("2d").drawImage(img,0,0,w,h); cb(c.toDataURL("image/jpeg",0.72)); }; img.onerror=()=>cb(null); img.src=r.result; }; r.onerror=()=>cb(null); r.readAsDataURL(file); }
function imagePickerHTML(cur){ return `<div class="form-row"><label>صورة المعاملة (اختيارية)</label><div class="img-pick"><img class="prev${cur?' on':''}" id="imgPrev" src="${cur||''}"><button id="imgBtn" type="button">📷 اختيار صورة</button><button id="imgClr" type="button" style="${cur?'':'display:none'}">✕ إزالة</button></div><input type="file" id="imgFile" accept="image/*" class="file-hidden"><div class="hint">بتتصغّر تلقائياً، وبتنحفظ مع الموقع عند النشر.</div></div>`; }
function wireImagePicker(cur){ pendingImage=cur||""; const fileEl=document.getElementById("imgFile"),prev=document.getElementById("imgPrev"),clr=document.getElementById("imgClr"); document.getElementById("imgBtn").addEventListener("click",()=>fileEl.click()); fileEl.addEventListener("change",function(){ const f=this.files[0]; if(!f) return; fileToDownscaled(f,(data)=>{ if(!data){ alert("تعذّرت قراءة الصورة."); return; } pendingImage=data; prev.src=data; prev.classList.add("on"); clr.style.display=""; }); this.value=""; }); clr.addEventListener("click",()=>{ pendingImage=""; prev.src=""; prev.classList.remove("on"); clr.style.display="none"; }); }

function answerForService(s){ let h=`حاضر 👇 <b>${escapeHtml(s.title)}</b>\n\nالمستندات المطلوبة:\n`; (s.docs||[]).forEach(d=>h+="• "+escapeHtml(d)+"\n"); if(s.fee) h+="\n💰 الرسوم: "+escapeHtml(s.fee); if(s.notes&&s.notes.length){ h+="\n\n📌 ملاحظات:\n"; s.notes.forEach(n=>h+="– "+escapeHtml(n)+"\n"); } if(s.warning){ h+="\n⚠️ "+escapeHtml(s.warning.title)+"\n"; s.warning.items.forEach(it=>h+="◂ "+escapeHtml(it)+"\n"); } h+=`\n<span style="color:var(--ink-soft);font-size:12.5px">للتفاصيل الكاملة اضغط الكرت بالصفحة.</span>`; return h; }
function localEngine(q){
  const n=norm(q), tokens=n.split(" ").filter(Boolean);
  if(/(شكوى|اشتكي|اشكي|اقتراح|اقترح)/.test(n)) return {type:"complaint"};
  if(/(تحدث|احكي|اتواصل|رقم المختار|واتس)/.test(n)&&waDigits(DATA.office.whatsapp)) return {type:"talk"};
  if(/(مرحبا|اهلا|هاي|هلا|سلام|صباح|مساء|كيفك)/.test(n)) return {type:"text",text:"أهلا وسهلا فيك 🌿 شو المعاملة يلي بتدوّر عليها؟"};
  if(/(شكرا|يسلمو|مرسي|يعطيك|تسلم)/.test(n)) return {type:"text",text:"العفو، بخدمتك دايماً 🙏"};
  if(/(تاخير|تاخر|غرامه|مهله|متاخر)/.test(n)){ const opts=DATA.services.filter(s=>s.warning).map(s=>s.title); if(opts.length) return {type:"options",text:"عن أي معاملة قصدك؟ (في مهل قانونية)",chips:opts}; }
  const scored=[];
  DATA.services.forEach(s=>{
    const hay=norm(s.title+" "+(s.keywords||[]).join(" "));
    const kws=[...(s.keywords||[]).map(norm), ...norm(s.title).split(" ")];
    let sc=0;
    kws.forEach(k=>{ if(k && n.includes(k)) sc+=Math.min(k.length,12); });
    tokens.forEach(t=>{ if(t.length>=3 && hay.includes(t)) sc+=t.length; });
    if(sc>0) scored.push({s,sc});
  });
  scored.sort((a,b)=>b.sc-a.sc);
  if(!scored.length) return {type:"fallback"};
  const best=scored[0].s, bestScore=scored[0].sc;
  const strong=scored.filter(x=>x.sc>=Math.max(5,bestScore*0.5));
  if(strong.length>=2) return {type:"multi", matches:strong.slice(0,6).map(x=>x.s)};
  if(bestScore>=4) return {type:"service",service:best};
  return {type:"fallback"};
}
async function aiEngine(q){
  const kb=DATA.services.map(s=>({title:s.title,docs:s.docs,fee:s.fee,notes:s.notes,warning:s.warning?{t:s.warning.title,items:s.warning.items}:null}));
  const sys="أنت مساعد لمكتب مختار لبناني. جاوب بالعربية اللبنانية المحكية، باختصار وبشكل واضح ومرتّب. اعتمد فقط على بيانات المعاملات التالية (JSON). إذا المعلومة مش موجودة، قل للمواطن يراجع المكتب أو يضغط «تحدّث مع المختار». اعطِ المستندات كنقاط. لا تخترع رسوم أو شروط.\n\nالبيانات:\n"+JSON.stringify(kb);
  const res=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-6",max_tokens:1000,system:sys,messages:[{role:"user",content:q}]})});
  if(!res.ok) throw new Error("ai"); const data=await res.json(); const t=(data.content||[]).map(b=>b.type==="text"?b.text:"").join("\n").trim(); if(!t) throw new Error("e"); return t;
}
async function handleSend(){
  const q=chatInput.value.trim(); if(!q) return; meSay(q); chatInput.value=""; chatChips.innerHTML="";
  const intent=localEngine(q);
  if(intent.type==="complaint"){ botSay("تكرم 🙏 عبّي طلبك وبيوصل مباشرة للمختار."); openComplaint(); return; }
  if(intent.type==="talk"){ botSay("عم افتحلك محادثة واتساب مع المختار 📲"); openWhatsApp("مرحبا، عندي استفسار عن معاملة 🙏"); return; }
  if(intent.type==="multi"){ botSay("لقيت كم معاملة مرتبطة 👇 اختار يلي بدّك:"); showChips([...intent.matches.map(s=>({svc:s.id,label:(s.icon||"")+" "+s.title})), ...actionChips()]); return; }
  typingOn(); let answered=false;
  if(USE_AI){ try{ const ai=await Promise.race([aiEngine(q), new Promise((_,rej)=>setTimeout(()=>rej(new Error("t")),8000))]); typingOff(); botSay(escapeHtml(ai)); showChips(actionChips()); answered=true; }catch(e){} }
  if(!answered){ typingOff(); if(intent.type==="service"){ botSay(answerForService(intent.service)); showChips(actionChips()); } else if(intent.type==="options"){ botSay(intent.text); showChips(intent.chips); } else if(intent.type==="text"){ botSay(intent.text); } else { botSay("ما لقيت معاملة بالظبط 🤔 جرّب تختار، أو تواصل مع المختار:"); showChips([...actionChips(), ...DATA.services.map(s=>s.title)]); } }
}
document.getElementById("fab").addEventListener("click",openChat);
document.getElementById("chatX").addEventListener("click",closeChat);
document.getElementById("chatWa").addEventListener("click",()=>openWhatsApp("مرحبا، عندي استفسار عن معاملة 🙏"));
document.getElementById("chatSend").addEventListener("click",handleSend);
chatInput.addEventListener("keydown",e=>{ if(e.key==="Enter") handleSend(); });

/* ===== إقلاع ===== */
(async function init(){
  try{ DATA=await loadDataAsync(); }catch(e){ DATA=loadDataSyncFallback(); }
  applyTheme(); applyFont(); applyHeader(); renderBoard(); setupPWA();
})();
</script>
